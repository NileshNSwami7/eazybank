services:
  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s # Increased for Java-heavy environments
    extends:
      file: common-config.yml
      service: network-deploy-service

  configserver:
    image: "nins07/configserver:eazyconfigserverv1"
    container_name: configserver-ms
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
    healthcheck:
      # Spring Boot 4 specific: Using curl/wget to check the Actuator health path
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8071/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    extends:
      file: common-config.yml
      service: microservice-base-config

  accounts:
    image: "nins07/accounts:eazyaccountsv1"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_healthy # Wait until configserver is fully UP
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      # In Boot 4, ensure the config server URL is explicitly passed if not in common-config
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  loans:
    image: "nins07/loans:eazyloansv1"
    container_name: loans-ms
    ports:
      - "8090:8090"
    depends_on:
      configserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "loans"
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  card:
    image: "nins07/card:eazycardsv1"
    container_name: cards-ms
    ports:
      - "9000:9000"
    depends_on:
      configserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "cards"
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071/"
    extends:
      file: common-config.yml
      service: microservice-configserver-config

networks:
  eazybank:
    driver: "bridge"
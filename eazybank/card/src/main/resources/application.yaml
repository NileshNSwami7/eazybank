server:
    port: 9000
spring:
  datasource:
      url: jdbc:h2:mem:testdb
      driverClassName: org.h2.Driver
      username: sa
      password: ''
      generate-unique-name: false
  h2:
    console:
      enabled: true
    jpa:
     database-platform: org.hibernate.dialect.H2Dialect
     hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import:
      - "application_prod.yml"
      - "application_qa.yml"
  profiles:
    active:
      - "prod"

build:
  version: "3.0.1"

